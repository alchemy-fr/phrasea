name: Cleanup ECR on branch delete

on:
  delete:
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch name to cleanup from ECR'
        required: true
        type: string

jobs:
  cleanup-ecr:
    runs-on: ubuntu-latest
    env:
      AWS_ECR_ACCESS_KEY_ID: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'delete' && github.event.ref_type == 'branch')
    steps:
      - name: Set branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.branch_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: env.AWS_ECR_ACCESS_KEY_ID != null
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_ACCESS_KEY_SECRET }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        if: env.AWS_ECR_ACCESS_KEY_ID != null
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Delete images tagged with deleted branch
        env:
          REGISTRY_ALIAS: b2s9z7l1
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        if: env.AWS_ECR_ACCESS_KEY_ID != null
        run: |
          set -e
          
          # Dynamically fetch all repositories starting with "ps-"
          echo "Fetching repositories..."
          if ! all_repos=$(aws ecr-public describe-repositories \
            --region us-east-1 \
            --output json 2>&1); then
            echo "ERROR: Failed to describe ECR repositories"
            echo "$all_repos"
            exit 1
          fi
          
          IMAGES=($(echo "$all_repos" | jq -r '.repositories[].repositoryName' | grep "^ps-" | sort))
          
          image_count=${#IMAGES[@]}
          echo "Found ${image_count} repositories starting with 'ps-'"
          echo ""
          echo "Cleaning up images tagged with branch: ${BRANCH_NAME}"
          
          for image in "${IMAGES[@]}"; do
            # Get all images in the repository
            all_images=$(aws ecr-public describe-images \
              --repository-name "$image" \
              --region us-east-1 \
              --output json 2>/dev/null || echo '{"imageDetails":[]}')
            
            # Filter images that have the branch tag using jq
            image_info=$(echo "$all_images" | jq -c ".imageDetails[] | select(.imageTags != null and (.imageTags[] | select(. == \"${BRANCH_NAME}\")))")
            
            if [ ! -z "$image_info" ]; then
              # Extract all tags for this specific image
              tags=$(echo "$image_info" | jq -r '.imageTags[]' 2>/dev/null || echo "")
              tag_count=$(echo "$tags" | grep -v '^$' | wc -l | tr -d ' ')
              
              if [ "$tag_count" -le 1 ]; then
                # Only the branch tag exists, delete entire image
                aws ecr-public batch-delete-image \
                  --repository-name "$image" \
                  --image-ids imageTag="${BRANCH_NAME}" \
                  --region us-east-1 > /dev/null 2>&1
                echo "✓ Deleted image $image:${BRANCH_NAME}"
              else
                # Multiple tags exist, delete only the branch tag
                aws ecr-public batch-delete-image \
                  --repository-name "$image" \
                  --image-ids imageTag="${BRANCH_NAME}" \
                  --region us-east-1 > /dev/null 2>&1
                
                # Also delete latest tag if branch had it
                has_latest=$(echo "$tags" | grep -q "^latest$" && echo 1 || echo 0)
                if [ "$has_latest" -gt 0 ]; then
                  aws ecr-public batch-delete-image \
                    --repository-name "$image" \
                    --image-ids imageTag="latest" \
                    --region us-east-1 > /dev/null 2>&1 || true
                  echo "✓ Deleted tags ${BRANCH_NAME} and latest from $image"
                else
                  echo "✓ Deleted tag ${BRANCH_NAME} from $image"
                fi
              fi
            fi
          done
          
          echo "Cleanup completed"

      - name: Cleanup untagged images from ECR Public
        if: env.AWS_ECR_ACCESS_KEY_ID != null
        run: |
          set -e
          
          echo "=========================================="
          echo "Cleanup Untagged Images from ECR Public"
          echo "=========================================="
          echo ""
          
          # Dynamically fetch all repositories starting with "ps-"
          echo "Fetching repositories starting with 'ps-'..."
          if ! all_repos=$(aws ecr-public describe-repositories \
            --region us-east-1 \
            --output json 2>&1); then
            echo "ERROR: Failed to describe ECR repositories"
            echo "$all_repos"
            exit 1
          fi
          
          REPOS=($(echo "$all_repos" | jq -r '.repositories[].repositoryName' | grep "^ps-" | sort))
          
          repos_count=${#REPOS[@]}
          echo "Found ${repos_count} repositories"
          echo ""
          
          total_untagged_found=0
          total_untagged_deleted=0
          batch_size=100
          
          # Process each repository
          for repo in "${REPOS[@]}"; do
            echo "Processing repository: $repo"
            
            # Get all images in the repository
            images_json=$(aws ecr-public describe-images \
              --repository-name "$repo" \
              --region us-east-1 \
              --output json 2>/dev/null || echo '{"imageDetails":[]}')
            
            # Extract untagged image digests
            untagged_digests=$(echo "$images_json" | jq -r '.imageDetails[] | select(.imageTags == null or (.imageTags | length == 0)) | .imageDigest' 2>/dev/null || echo "")
            
            if [ -z "$untagged_digests" ]; then
              echo "  ✓ No untagged images found"
              echo ""
              continue
            fi
            
            # Convert to array
            declare -a digests=()
            while IFS= read -r digest; do
              if [ -n "$digest" ]; then
                digests+=("$digest")
              fi
            done <<< "$untagged_digests"
            
            untagged_count=${#digests[@]}
            echo "  Found $untagged_count untagged image(s)"
            ((total_untagged_found += untagged_count))
            
            # Delete by batches of 100 (AWS limit)
            for ((i=0; i<untagged_count; i+=batch_size)); do
              batch_end=$((i + batch_size))
              if [ $batch_end -gt $untagged_count ]; then
                batch_end=$untagged_count
              fi
              
              batch_count=$((batch_end - i))
              batch_num=$((i / batch_size + 1))
              total_batches=$(((untagged_count + batch_size - 1) / batch_size))
              
              # Build image-ids for batch delete
              image_ids=""
              for ((j=i; j<batch_end; j++)); do
                image_ids="$image_ids imageDigest=${digests[$j]}"
              done
              
              # Execute batch delete
              echo "  Deleting batch $batch_num/$total_batches ($batch_count images)..."
              
              if result=$(aws ecr-public batch-delete-image \
                --repository-name "$repo" \
                --image-ids $image_ids \
                --region us-east-1 \
                --output json 2>&1); then
                
                deleted_count=$(echo "$result" | jq -r '.imageIds | length' 2>/dev/null || echo "0")
                failed_count=$(echo "$result" | jq -r '.failures | length' 2>/dev/null || echo "0")
                
                ((total_untagged_deleted += deleted_count))
                
                if [ "$deleted_count" -gt 0 ]; then
                  echo "    ✓ Deleted $deleted_count image(s)"
                fi
                
                if [ "$failed_count" -gt 0 ]; then
                  echo "    ⚠ $failed_count deletion(s) failed"
                fi
              else
                echo "    ✗ Error during batch delete"
              fi
            done
            
            echo ""
          done
          
          # Summary
          echo "=========================================="
          echo "Summary"
          echo "=========================================="
          echo "Total repositories processed: ${repos_count}"
          echo "Total untagged images found: ${total_untagged_found}"
          echo "Total untagged images deleted: ${total_untagged_deleted}"
          echo ""
